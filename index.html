<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出國幣別轉換 + 計算機</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #1b2333;
    --muted: #6b7488;
    --line: #e3e7f0;
    --accent: #3b6ef6;
    --accent-soft: #e8effe;
    --key: #f0f2f7;
    --key-text: #1b2333;
    --shadow: 0 8px 30px rgba(30,45,90,.08);
  }
  html[data-theme="dark"] {
    --bg: #0f131c;
    --card: #1a2130;
    --text: #eef1f7;
    --muted: #9aa3b6;
    --line: #2a3242;
    --accent: #5b86ff;
    --accent-soft: #1e2942;
    --key: #232c3d;
    --key-text: #eef1f7;
    --shadow: 0 8px 30px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 14px 40px;
    transition: background .25s, color .25s;
  }
  .wrap { max-width: 460px; margin: 0 auto; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .5px; }
  #themeBtn {
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
    font-size: 1.1rem; box-shadow: var(--shadow);
  }
  .card {
    background: var(--card); border-radius: 18px; padding: 18px;
    box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .row { position: relative; }
  .row + .row { margin-top: 10px; }
  .row label { display:block; font-size:.78rem; color: var(--muted); margin-bottom:6px; }
  .field {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--line); border-radius: 14px; padding: 10px 12px;
    background: var(--bg);
  }
  .field select {
    border: none; background: transparent; color: var(--text);
    font-size: 1rem; font-weight: 600; cursor: pointer; outline: none;
    padding: 4px; min-width: 116px;
  }
  .field input {
    flex: 1; border: none; background: transparent; color: var(--text);
    font-size: 1.5rem; font-weight: 700; text-align: right; outline: none;
    width: 100%; font-variant-numeric: tabular-nums;
  }
  .swap-wrap { text-align: center; height: 0; }
  #swapBtn {
    position: relative; top: -2px;
    background: var(--accent); color: #fff; border: 4px solid var(--card);
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    font-size: 1.2rem; box-shadow: var(--shadow);
  }
  .meta {
    font-size: .78rem; color: var(--muted); text-align: center;
    margin-top: 4px; line-height: 1.5;
  }
  .meta b { color: var(--accent); }
  /* calculator */
  .calc-title {
    font-size: .82rem; color: var(--muted); margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .calc-title span:last-child { color: var(--accent); font-weight:600; }
  #calcDisplay {
    background: var(--bg); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; text-align: right; margin-bottom: 12px; min-height: 68px;
    display:flex; flex-direction:column; justify-content:center;
  }
  #calcExpr { font-size: .85rem; color: var(--muted); min-height: 18px; word-break: break-all; }
  #calcResult { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; word-break: break-all; }
  .keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .keys button {
    padding: 15px 0; border: none; border-radius: 14px; cursor: pointer;
    font-size: 1.15rem; font-weight: 600; background: var(--key); color: var(--key-text);
    transition: filter .1s;
  }
  .keys button:active { filter: brightness(.9); }
  .keys .op { background: var(--accent-soft); color: var(--accent); }
  .keys .eq { background: var(--accent); color: #fff; }
  .keys .fn { color: var(--muted); }
  .keys .span2 { grid-column: span 2; }
  .send {
    width: 100%; margin-top: 12px; padding: 13px; border: none; border-radius: 14px;
    background: var(--accent-soft); color: var(--accent); font-weight: 700;
    font-size: .95rem; cursor: pointer;
  }
  footer { text-align:center; font-size:.72rem; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>💱 出國幣別轉換</h1>
    <button id="themeBtn" title="切換深色模式">🌙</button>
  </header>

  <div class="card">
    <div class="row">
      <label>從</label>
      <div class="field">
        <select id="fromCur"></select>
        <input id="fromAmt" type="text" inputmode="decimal" value="1000" />
      </div>
    </div>

    <div class="swap-wrap"><button id="swapBtn" title="對調">⇅</button></div>

    <div class="row">
      <label>換成</label>
      <div class="field">
        <select id="toCur"></select>
        <input id="toAmt" type="text" inputmode="decimal" readonly />
      </div>
    </div>

    <div class="meta" id="rateInfo">載入匯率中…</div>
  </div>

  <div class="card">
    <div class="calc-title">
      <span>🧮 計算機（算飯店每晚多少錢）</span>
      <span id="calcCur"></span>
    </div>
    <div id="calcDisplay">
      <div id="calcExpr"></div>
      <div id="calcResult">0</div>
    </div>
    <div class="keys">
      <button class="fn" data-act="clear">C</button>
      <button class="fn" data-act="back">⌫</button>
      <button class="op" data-val="%">%</button>
      <button class="op" data-val="/">÷</button>

      <button data-val="7">7</button>
      <button data-val="8">8</button>
      <button data-val="9">9</button>
      <button class="op" data-val="*">×</button>

      <button data-val="4">4</button>
      <button data-val="5">5</button>
      <button data-val="6">6</button>
      <button class="op" data-val="-">−</button>

      <button data-val="1">1</button>
      <button data-val="2">2</button>
      <button data-val="3">3</button>
      <button class="op" data-val="+">+</button>

      <button class="span2" data-val="0">0</button>
      <button data-val=".">.</button>
      <button class="eq" data-act="eq">=</button>
    </div>
    <button class="send" id="sendToConv">↑ 把結果帶入上方換算</button>
  </div>

  <footer>匯率來源：exchangerate-api.com ・ 僅供參考</footer>
</div>

<script>
// ---- 幣別清單（含旗幟與中文名）----
const CURRENCIES = [
  ["TWD","🇹🇼","台幣"], ["JPY","🇯🇵","日圓"], ["KRW","🇰🇷","韓元"],
  ["USD","🇺🇸","美金"], ["EUR","🇪🇺","歐元"], ["CNY","🇨🇳","人民幣"],
  ["HKD","🇭🇰","港幣"], ["THB","🇹🇭","泰銖"], ["SGD","🇸🇬","新加坡幣"],
  ["GBP","🇬🇧","英鎊"], ["AUD","🇦🇺","澳幣"], ["VND","🇻🇳","越南盾"],
  ["MYR","🇲🇾","馬幣"], ["PHP","🇵🇭","菲律賓披索"], ["IDR","🇮🇩","印尼盾"]
];

// 備用匯率（相對 USD），API 失敗時使用。最後更新 2026-07-06
const FALLBACK = {
  base: "USD", updated: "2026-07-06（內建備用）",
  rates: {USD:1,TWD:31.97,JPY:161.39,KRW:1530.98,EUR:0.8743,CNY:6.7855,
  HKD:7.8434,THB:33.16,SGD:1.2917,GBP:0.7491,AUD:1.4416,VND:26204.85,
  MYR:4.0713,PHP:61.51,IDR:17986.54}
};

const $ = id => document.getElementById(id);
let rates = null, rateBase = "USD", rateUpdated = "", isLive = false;

// ---- 記住設定 ----
const store = {
  get: k => { try { return localStorage.getItem(k); } catch(e){ return null; } },
  set: (k,v) => { try { localStorage.setItem(k,v); } catch(e){} }
};

// ---- 建立幣別下拉 ----
function fillSelect(sel, selected) {
  sel.innerHTML = CURRENCIES.map(([c,f,n]) =>
    `<option value="${c}">${f} ${c} ${n}</option>`).join("");
  sel.value = selected;
}

// ---- 主題 ----
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  $("themeBtn").textContent = t === "dark" ? "☀️" : "🌙";
  store.set("theme", t);
}

// ---- 抓匯率 ----
async function loadRates() {
  try {
    const r = await fetch("https://open.er-api.com/v6/latest/USD");
    const d = await r.json();
    if (d.result === "success" && d.rates) {
      rates = d.rates; rateBase = d.base_code || "USD";
      rateUpdated = d.time_last_update_utc
        ? new Date(d.time_last_update_unix*1000).toLocaleString("zh-TW",{dateStyle:"short",timeStyle:"short"})
        : "";
      isLive = true;
      convert();
      return;
    }
    throw new Error("bad payload");
  } catch(e) {
    rates = FALLBACK.rates; rateBase = FALLBACK.base;
    rateUpdated = FALLBACK.updated; isLive = false;
    convert();
  }
}

// ---- 換算 ----
function parseNum(s){ const n = parseFloat(String(s).replace(/,/g,"")); return isNaN(n)?0:n; }
function fmt(n){
  if (!isFinite(n)) return "0";
  return n.toLocaleString("en-US",{maximumFractionDigits:4});
}
function convert() {
  if (!rates) return;
  const from = $("fromCur").value, to = $("toCur").value;
  const amt = parseNum($("fromAmt").value);
  const rf = rates[from], rt = rates[to];
  if (!rf || !rt) return;
  const usd = amt / rf;          // 換成 base(USD)
  const out = usd * rt;
  $("toAmt").value = fmt(out);
  // 每 1 單位匯率
  const per = (1/rf)*rt;
  $("rateInfo").innerHTML =
    `1 ${from} = <b>${fmt(per)}</b> ${to}<br>` +
    `${isLive ? "🟢 即時匯率" : "🟡 備用匯率"} ・ 更新：${rateUpdated}`;
  $("calcCur").textContent = "→ 目前：" + from;
}

// ---- 計算機 ----
let expr = "";
function calcRender(){
  $("calcExpr").textContent = expr.replace(/\*/g,"×").replace(/\//g,"÷") || "";
  $("calcResult").textContent = calcEval(expr) ?? ($("calcResult").textContent);
}
function calcEval(e){
  if (!e) return "0";
  // 只允許數字與運算符
  if (!/^[0-9+\-*/%. ]*$/.test(e)) return null;
  let s = e.replace(/([0-9.]+)%/g, "($1/100)");
  try {
    const v = Function('"use strict";return (' + s + ')')();
    if (typeof v !== "number" || !isFinite(v)) return null;
    return fmt(Math.round(v*1e6)/1e6);
  } catch(err){ return null; }
}
function calcKey(act, val){
  if (act === "clear"){ expr=""; }
  else if (act === "back"){ expr = expr.slice(0,-1); }
  else if (act === "eq"){
    const v = calcEval(expr);
    if (v !== null){ expr = v.replace(/,/g,""); }
  }
  else if (val !== undefined){
    const last = expr.slice(-1);
    if ("+-*/".includes(val) && "+-*/".includes(last)) expr = expr.slice(0,-1);
    expr += val;
  }
  calcRender();
}

// ---- 事件 ----
document.querySelectorAll(".keys button").forEach(b=>{
  b.addEventListener("click", ()=> calcKey(b.dataset.act, b.dataset.val));
});
$("sendToConv").addEventListener("click", ()=>{
  const v = calcEval(expr);
  if (v && v !== null){ $("fromAmt").value = v.replace(/,/g,""); convert(); }
});
$("fromAmt").addEventListener("input", convert);
["fromCur","toCur"].forEach(id=>{
  $(id).addEventListener("change", ()=>{
    store.set(id, $(id).value); convert();
  });
});
$("swapBtn").addEventListener("click", ()=>{
  const f = $("fromCur").value, t = $("toCur").value;
  $("fromCur").value = t; $("toCur").value = f;
  $("fromAmt").value = parseNum($("toAmt").value) || $("fromAmt").value;
  store.set("fromCur", $("fromCur").value); store.set("toCur", $("toCur").value);
  convert();
});
$("themeBtn").addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur === "dark" ? "light" : "dark");
});

// ---- 初始化 ----
(function init(){
  const savedTheme = store.get("theme")
    || (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark":"light");
  applyTheme(savedTheme);
  fillSelect($("fromCur"), store.get("fromCur") || "TWD");
  fillSelect($("toCur"), store.get("toCur") || "JPY");
  calcRender();
  loadRates();
})();
</script>
</body>
</html>
